name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Lint
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test

  release:
    name: release
    needs: test
    runs-on: macos-15
    env:
      TAG: v0.2.${{ github.run_number }}
      APP_PATH: target/release/bundle/macos/Clipboard Saver.app
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install tauri-cli
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall tauri-cli --no-confirm
      - name: Build app bundle
        env:
          # Baked into the binary via option_env!; the in-app updater
          # compares this tag against the latest GitHub release.
          APP_RELEASE_TAG: v0.2.${{ github.run_number }}
        run: |
          cargo tauri build
          /usr/libexec/PlistBuddy -c "Add :LSUIElement bool true" "$APP_PATH/Contents/Info.plist" \
            || /usr/libexec/PlistBuddy -c "Set :LSUIElement true" "$APP_PATH/Contents/Info.plist"
          codesign --force --deep -s - "$APP_PATH"
      - name: Package app zip
        run: ditto -c -k --keepParent "$APP_PATH" ClipboardSaver.app.zip
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" ClipboardSaver.app.zip \
            --title "Clipboard Saver $TAG" \
            --notes "$(git log -1 --pretty=%s)"
